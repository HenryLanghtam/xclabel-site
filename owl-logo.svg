<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <radialGradient id="eyeGlowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#60D0FF"/>
      <stop offset="45%" stop-color="#1A8FE3"/>
      <stop offset="100%" stop-color="#0A3A8A"/>
    </radialGradient>
    <radialGradient id="eyeGlowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#60D0FF"/>
      <stop offset="45%" stop-color="#1A8FE3"/>
      <stop offset="100%" stop-color="#0A3A8A"/>
    </radialGradient>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"  stop-color="#2255B8"/>
      <stop offset="60%" stop-color="#1240A0"/>
      <stop offset="100%" stop-color="#0A2878"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="50%" cy="38%" r="55%">
      <stop offset="0%"  stop-color="#2B66D8"/>
      <stop offset="65%" stop-color="#1544B0"/>
      <stop offset="100%" stop-color="#0C2D88"/>
    </radialGradient>
    <filter id="eyeBloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Wing left ─────────────────────────────────────────────── -->
  <path d="M32 115 Q10 105 8 130 Q6 158 28 170 Q44 180 55 168 L60 130 Z"
        fill="url(#bodyGrad)" stroke="#1E5ACA" stroke-width="0.8"/>
  <path d="M38 120 Q18 113 14 138 Q12 160 34 170"
        fill="none" stroke="#1A4ABB" stroke-width="1.2" opacity="0.7"/>
  <path d="M42 125 Q24 118 20 144 Q18 164 40 172"
        fill="none" stroke="#1A4ABB" stroke-width="1" opacity="0.5"/>

  <!-- ── Wing right ─────────────────────────────────────────────── -->
  <path d="M168 115 Q190 105 192 130 Q194 158 172 170 Q156 180 145 168 L140 130 Z"
        fill="url(#bodyGrad)" stroke="#1E5ACA" stroke-width="0.8"/>
  <path d="M162 120 Q182 113 186 138 Q188 160 166 170"
        fill="none" stroke="#1A4ABB" stroke-width="1.2" opacity="0.7"/>
  <path d="M158 125 Q176 118 180 144 Q182 164 160 172"
        fill="none" stroke="#1A4ABB" stroke-width="1" opacity="0.5"/>

  <!-- ── Body ────────────────────────────────────────────────────── -->
  <ellipse cx="100" cy="160" rx="55" ry="52" fill="url(#bodyGrad)"/>
  <!-- Chest silver plumage -->
  <ellipse cx="100" cy="162" rx="28" ry="36" fill="#7A9FD8" opacity="0.22"/>
  <ellipse cx="100" cy="158" rx="18" ry="26" fill="#9EC4EC" opacity="0.18"/>
  <!-- Chest feather lines -->
  <path d="M90 140 Q100 148 110 140" stroke="#5080C8" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M85 150 Q100 160 115 150" stroke="#5080C8" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M83 160 Q100 171 117 160" stroke="#5080C8" stroke-width="0.7" fill="none" opacity="0.4"/>
  <path d="M86 170 Q100 180 114 170" stroke="#5080C8" stroke-width="0.6" fill="none" opacity="0.35"/>

  <!-- ── Ear tufts ─────────────────────────────────────────────── -->
  <!-- Left tuft -->
  <path d="M72 55 L60 10 L80 48 Z" fill="#B8CCEE"/>
  <path d="M74 53 L63 12 L78 46 Z" fill="white" opacity="0.85"/>
  <path d="M72 54 L64 18 L76 48 Z" fill="#D8E8F8" opacity="0.6"/>
  <!-- Right tuft -->
  <path d="M128 55 L140 10 L120 48 Z" fill="#B8CCEE"/>
  <path d="M126 53 L137 12 L122 46 Z" fill="white" opacity="0.85"/>
  <path d="M128 54 L136 18 L124 48 Z" fill="#D8E8F8" opacity="0.6"/>

  <!-- ── Head ────────────────────────────────────────────────────── -->
  <ellipse cx="100" cy="90" rx="62" ry="60" fill="url(#headGrad)"/>
  <!-- Facial disc -->
  <ellipse cx="100" cy="92" rx="53" ry="51" fill="#183EC0" opacity="0.55"/>
  <!-- Forehead feather suggestion -->
  <path d="M70 52 Q100 44 130 52 Q118 60 100 62 Q82 60 70 52Z" fill="#2860D8" opacity="0.4"/>

  <!-- ── Eye left ───────────────────────────────────────────────── -->
  <!-- Outer dark ring -->
  <circle cx="73" cy="88" r="22" fill="#06133A"/>
  <!-- Sclera dark -->
  <circle cx="73" cy="88" r="20" fill="#081B60"/>
  <!-- Iris -->
  <circle cx="73" cy="88" r="16" fill="url(#eyeGlowL)" filter="url(#eyeBloom)"/>
  <!-- Iris detail ring -->
  <circle cx="73" cy="88" r="12" fill="#1070E0" opacity="0.7"/>
  <circle cx="73" cy="88" r="9"  fill="#1898F8" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="73" cy="88" r="6"  fill="#030D28"/>
  <!-- Catchlight -->
  <circle cx="77" cy="83" r="3.2" fill="white" opacity="0.92"/>
  <circle cx="69" cy="92" r="1.4" fill="white" opacity="0.35"/>
  <!-- Rim glow -->
  <circle cx="73" cy="88" r="20" fill="none" stroke="#50B8FF" stroke-width="1.2" opacity="0.5"/>

  <!-- ── Eye right ─────────────────────────────────────────────── -->
  <circle cx="127" cy="88" r="22" fill="#06133A"/>
  <circle cx="127" cy="88" r="20" fill="#081B60"/>
  <circle cx="127" cy="88" r="16" fill="url(#eyeGlowR)" filter="url(#eyeBloom)"/>
  <circle cx="127" cy="88" r="12" fill="#1070E0" opacity="0.7"/>
  <circle cx="127" cy="88" r="9"  fill="#1898F8" opacity="0.6"/>
  <circle cx="127" cy="88" r="6"  fill="#030D28"/>
  <circle cx="131" cy="83" r="3.2" fill="white" opacity="0.92"/>
  <circle cx="123" cy="92" r="1.4" fill="white" opacity="0.35"/>
  <circle cx="127" cy="88" r="20" fill="none" stroke="#50B8FF" stroke-width="1.2" opacity="0.5"/>

  <!-- ── Brow ridges ────────────────────────────────────────────── -->
  <path d="M54 68 Q73 60 90 68" stroke="#8AB0E0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M146 68 Q127 60 110 68" stroke="#8AB0E0" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- ── Nose / beak ────────────────────────────────────────────── -->
  <path d="M93 104 L100 115 L107 104 Q103 100 100 99 Q97 100 93 104Z"
        fill="#7A8EC8" opacity="0.9"/>
  <path d="M94 105 L100 114 L106 105" stroke="#5060A0" stroke-width="0.6" fill="none" opacity="0.6"/>

  <!-- ── Chin feathers ──────────────────────────────────────────── -->
  <path d="M80 118 Q100 126 120 118 Q110 132 100 134 Q90 132 80 118Z"
        fill="#5A80CC" opacity="0.35"/>
</svg>
